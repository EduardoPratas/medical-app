<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Patient List</title>
    <style>
        body { font-family: Arial; margin: 20px; }
        table { border-collapse: collapse; width: 100%; margin-top: 15px; }
        th, td { border: 1px solid #ddd; padding: 8px; text-align: left; }
        th { background-color: #4CAF50; color: white; }
        .toolbar { display: flex; gap: 10px; margin-bottom: 10px; }
        .btn { padding: 8px 14px; text-decoration: none; border-radius: 3px; font-size: 14px; }
        .btn-add { background-color: #4CAF50; color: white; }
        .btn-fhir { background-color: #1565C0; color: white; }
        .btn-delete { background-color: #f44336; color: white; }
        .btn-view { color: #1565C0; }
    </style>
</head>
<body>
    <h1>Patient List</h1>

    <div class="toolbar">
        <a th:href="@{/patients/new}" class="btn btn-add">+ Add New Patient</a>
        <a th:href="@{/fhir/import}" class="btn btn-fhir">🔗 Import from FHIR</a>
    </div>

    <table>
        <thead>
            <tr>
                <th>ID</th>
                <th>Name</th>
                <th>Email</th>
                <th>Phone</th>
                <th>Actions</th>
            </tr>
        </thead>
        <tbody>
            <tr th:each="patient : ${patients}">
                <td th:text="${patient.id}">1</td>
                <td th:text="${patient.name}">John Doe</td>
                <td th:text="${patient.email}">john@example.com</td>
                <td th:text="${patient.phone}">1234567890</td>
                <td>
                    <a th:href="@{'/patients/' + ${patient.id} + '/record'}" class="btn-view">View Record</a>
                    |
                    <a th:href="@{'/patients/delete/' + ${patient.id}}"
                       class="btn-delete btn"
                       onclick="return confirm('Are you sure?')">Delete</a>
                </td>
            </tr>
        </tbody>
    </table>
</body>
</html>
